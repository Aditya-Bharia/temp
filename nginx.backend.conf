# ============================================================================
# nginx.backend.conf - Backend API Nginx configuration
# ============================================================================

upstream backend {
    server backend:8000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=download_api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general_api:10m rate=20r/s;

server {
    listen 8001;
    server_name _;

    # Logging for debugging
    access_log /var/log/nginx/backend_access.log combined;
    error_log /var/log/nginx/backend_error.log warn;

    # API endpoints
    location /api/ {
        limit_req zone=general_api burst=10 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Download-heavy endpoints with stricter rate limiting
    location /api/start-download/ {
        limit_req zone=download_api burst=3 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Metrics endpoint
    location /metrics {
        access_log off;
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        access_log off;
        proxy_pass http://backend/api/health;
    }
}
